site_name: Molo Documentation
site_description: Molo spatial omics analysis workflow documentation
site_url: https://lplsxyj.github.io/molo-docs/en/
docs_dir: source_en
site_dir: site/en
strict: true

theme:
  name: material
  language: en
  logo: assets/molo.svg
  favicon: assets/molo.svg
  features:
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - content.code.copy
    - content.tabs.link
    - search.highlight
    - search.suggest
  palette:
    - scheme: default
      primary: teal
      accent: amber

extra:
  alternate:
    - name: English
      link: /molo-docs/en/
      lang: en
    - name: 简体中文
      link: /molo-docs/
      lang: zh

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Data Preparation: data-preparation.md
  - Web Workflow: web-workflow.md
  - Python CLI: python-cli.md
  - R Function Reference: r-functions.md
  - Result Files: results.md
  - HTTP API: api.md
  - Web Service Deployment: deployment.md
  - Documentation Site Deployment: documentation-site.md
  - FAQ: faq.md

plugins:
  - search:
      lang: en

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

extra_css:
  - assets/stylesheets/extra.css
